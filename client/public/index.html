  <script>
    // Suppress ResizeObserver loop errors during capture phase to prevent CRA fullscreen overlay
    window.addEventListener('error', function(e) {
      if (e && e.message && (e.message.indexOf('ResizeObserver') !== -1 || e.message.indexOf('Resize observer') !== -1)) {
        e.stopImmediatePropagation();
        e.preventDefault();
      }
    }, true);
  </script>
